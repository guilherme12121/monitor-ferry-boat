name: Monitor Ferry Boat

on:
  schedule:
    - cron: '*/5 * * * *' # Roda a cada 5 minutos
  workflow_dispatch: # Permite criar um botão para você rodar manualmente quando quiser

jobs:
  rodar-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Puxar o código do repositório
        uses: actions/checkout@v4

      - name: Instalar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar bibliotecas
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install-deps chromium
          playwright install chromium

      - name: Executar o Robô
        env:
          USUARIO_SIGOM: ${{ secrets.USUARIO_SIGOM }}
          SENHA_SIGOM: ${{ secrets.SENHA_SIGOM }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python Itaparica/bot_travessia.py
